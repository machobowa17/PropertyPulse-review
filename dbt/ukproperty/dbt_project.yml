name: 'ukproperty'
version: '1.0.0'
config-version: 2

profile: 'ukproperty'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  start_year: 2015
  current_year: 2025

models:
  ukproperty:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
