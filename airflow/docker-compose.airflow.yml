version: "3.9"

# Airflow services — extend the main docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f airflow/docker-compose.airflow.yml up

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_db/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    # App env vars passed through
    DATABASE_URL: postgresql://ukproperty:ukproperty_dev@db:5432/ukproperty
    REDIS_URL: redis://redis:6379/0
    POSTGRES_HOST: db
    POSTGRES_PORT: "5432"
    POSTGRES_DB: ukproperty
    POSTGRES_USER: ukproperty
    POSTGRES_PASSWORD: ukproperty_dev
    ETL_DIR: /opt/etl
    DBT_DIR: /opt/dbt/ukproperty
    API_BASE_URL: http://api:8000/api/v1
    SLACK_WEBHOOK_URL: ""
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ../etl:/opt/etl
    - ../dbt:/opt/dbt
  depends_on:
    airflow_db:
      condition: service_healthy
  restart: unless-stopped

services:
  airflow_db:
    image: postgres:15-alpine
    container_name: airflow_db
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow_webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow_scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 10s
      timeout: 10s
      retries: 5

  airflow_init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@propertypulse.co.uk \
          --password admin
    restart: "no"

volumes:
  airflow_pgdata:
