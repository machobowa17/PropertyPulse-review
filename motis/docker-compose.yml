services:
  motis-import:
    image: ghcr.io/motis-project/motis:master
    volumes:
      - ./data:/input:ro
      - ./config.yml:/config.yml:ro
      - motis-data:/data
    command: /motis import
    profiles:
      - import

  motis:
    image: ghcr.io/motis-project/motis:master
    volumes:
      - ./data:/input:ro
      - ./config.yml:/config.yml:ro
      - motis-data:/data:ro
    command: /motis server
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/v1/plan?fromPlace=51.5074,-0.1278&toPlace=51.5013,-0.0886&time=2026-04-22T08:00:00Z&numItineraries=1&mode=TRANSIT,WALK"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  motis-data:
