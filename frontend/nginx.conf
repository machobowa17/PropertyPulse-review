# HTTP server — used in development and as HTTPS redirect in production.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    # X-XSS-Protection removed — deprecated header
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com; connect-src 'self' https://tile.openstreetmap.org https://*.basemaps.cartocdn.com; worker-src 'self' blob:; frame-ancestors 'none';" always;
    server_tokens off;

    # Proxy API to backend
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Hashed assets (Vite fingerprints every JS/CSS file — immutable caching is safe)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # SPA fallback — index.html must NEVER be cached (it references hashed asset URLs)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # Health check endpoint for Docker
    location /nginx-health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
