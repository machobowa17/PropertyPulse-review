# Production HTTPS configuration for PropertyPulse.
#
# Activation:
#   1. Mount TLS cert + key at /etc/nginx/ssl/cert.pem and key.pem
#      (e.g. via Docker volume or Certbot renewal)
#   2. Copy this file to /etc/nginx/conf.d/default.conf (replacing nginx.conf)
#      or include it alongside nginx.conf via an entrypoint script.
#   3. Expose port 443 in docker-compose.yml:
#        ports:
#          - "443:443"
#          - "80:80"

# HTTP → HTTPS redirect (with ACME challenge passthrough for Let's Encrypt)
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/simusimi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/simusimi.com/privkey.pem;

    # Modern TLS (Mozilla "Intermediate" profile)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression (backend GZipMiddleware removed in H6 — nginx handles it)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/geo+json;

    # Security headers (includes HSTS)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    # X-XSS-Protection removed — deprecated header
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com; connect-src 'self' https://tile.openstreetmap.org https://*.basemaps.cartocdn.com; worker-src 'self' blob:; frame-ancestors 'none';" always;
    server_tokens off;

    # Proxy API to backend
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
    }

    # SPA fallback — index.html must never be cached (hashed assets handle their own caching)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # No caching — prevents stale assets during active development
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;
    }

    # Health check
    location /nginx-health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
