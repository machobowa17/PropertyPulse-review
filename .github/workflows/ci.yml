name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libpq-dev
          pip install -r backend/requirements.txt

      - name: Syntax check (all .py files)
        run: python -m py_compile backend/app/main.py
        # Validates that the entrypoint imports resolve

      - name: Check Python syntax across backend
        run: |
          find backend/app -name '*.py' -exec python -c "
          import ast, sys
          for f in sys.argv[1:]:
              try:
                  ast.parse(open(f).read())
              except SyntaxError as e:
                  print(f'FAIL {f}: {e}')
                  sys.exit(1)
          " {} +

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t propertypulse-api backend/

      - name: Build frontend image
        run: docker build -t propertypulse-web frontend/
