version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: ukproperty_db
    environment:
      POSTGRES_DB: ukproperty
      POSTGRES_USER: ukproperty
      POSTGRES_PASSWORD: ukproperty_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ukproperty"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ukproperty_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ukproperty_api
    ports:
      - "8008:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ukproperty:ukproperty_dev@db:5432/ukproperty
      DATABASE_URL_SYNC: postgresql://ukproperty:ukproperty_dev@db:5432/ukproperty
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  pgdata:
