# Production overrides for AWS EC2 (t4g.small / t4g.medium)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file extends docker-compose.yml with:
#   - PostgreSQL tuning (R22 spec from memory/deployment.md)
#   - SSL/TLS via Let's Encrypt (certbot)
#   - Resource limits for 2 GB RAM (t4g.small)
#   - EBS-backed named volumes
#   - Production nginx config with HTTPS

services:
  db:
    image: imresamu/postgis:16-3.4  # ARM64-native (official postgis/postgis is amd64 only)
    command: >
      postgres
        -c shared_buffers=512MB
        -c work_mem=32MB
        -c maintenance_work_mem=128MB
        -c effective_cache_size=1500MB
        -c max_parallel_workers_per_gather=1
        -c max_parallel_workers=2
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c max_connections=50
    ports: []  # No external port exposure in production
    deploy:
      resources:
        limits:
          memory: 1280M
        reservations:
          memory: 768M

  redis:
    ports: []  # No external port exposure in production
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  api:
    ports: []  # Nginx handles external traffic
    volumes: []  # No bind-mount in production (code baked into image)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  frontend:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  # Certbot sidecar — runs once for initial cert, then renews via cron
  certbot:
    image: certbot/certbot:arm64v8-latest
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  pgdata:
  redisdata:
  certbot-etc:
  certbot-www:
